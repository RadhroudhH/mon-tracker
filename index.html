<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#0A0E0C" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>Carnet</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            :root {
                --bg: #0a0e0c;
                --bg-2: #101512;
                --surface: #171d19;
                --surface-2: #1f2622;
                --border: #262e29;
                --border-lift: #303934;
                --text: #e9e7de;
                --text-2: #a6a79e;
                --text-3: #6b6e68;
                --text-4: #45483f;
                --accent: #c4a85c;
                --accent-2: #e8ce84;
                --accent-dim: #7a6a3a;
                --danger: #d97558;
                --success: #6db89b;
                --violet: #9b87be;
                --amber: #d9954a;
                --font-display: "Fraunces", Georgia, serif;
                --font-body: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
                --ease: cubic-bezier(0.22, 1, 0.36, 1);
                --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            html,
            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font-body);
                font-size: 15px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }
            body {
                max-width: 640px;
                margin: 0 auto;
                padding: env(safe-area-inset-top, 0) 0 calc(120px + env(safe-area-inset-bottom, 0));
                min-height: 100vh;
                background: radial-gradient(1200px 600px at 50% -300px, rgba(196, 168, 92, 0.06), transparent 60%), var(--bg);
                overscroll-behavior: none;
            }
            button,
            input,
            select,
            textarea {
                font-family: inherit;
                color: inherit;
            }
            button {
                cursor: pointer;
                border: none;
                background: none;
            }

            /* ============ LOCK SCREEN ============ */
            #lock {
                position: fixed;
                inset: 0;
                z-index: 1000;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 24px;
                animation: fadeIn 0.4s var(--ease);
            }
            #lock::before {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(600px 300px at 50% 30%, rgba(196, 168, 92, 0.08), transparent 70%);
                pointer-events: none;
            }
            .lock-brand {
                font-family: var(--font-display);
                font-weight: 300;
                font-size: 34px;
                letter-spacing: -0.02em;
                margin-bottom: 6px;
                font-style: italic;
                color: var(--text);
                animation: fadeSlide 0.6s var(--ease);
            }
            .lock-sub {
                font-size: 11px;
                letter-spacing: 0.35em;
                text-transform: uppercase;
                color: var(--text-4);
                margin-bottom: 56px;
                animation: fadeSlide 0.6s var(--ease) 0.1s backwards;
            }
            #pin-display {
                display: flex;
                gap: 14px;
                margin-bottom: 52px;
                min-height: 12px;
                animation: fadeSlide 0.6s var(--ease) 0.2s backwards;
            }
            .pin-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--accent);
                animation: pinPop 0.2s var(--ease-back);
            }
            #pin-display.error .pin-dot {
                background: var(--danger);
            }
            #pin-display.error {
                animation: shake 0.4s;
            }
            @keyframes pinPop {
                from {
                    transform: scale(0);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                20%,
                60% {
                    transform: translateX(-10px);
                }
                40%,
                80% {
                    transform: translateX(10px);
                }
            }
            .numpad {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                width: 300px;
                max-width: 84vw;
                animation: fadeSlide 0.6s var(--ease) 0.3s backwards;
            }
            .numpad button {
                aspect-ratio: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 50%;
                font-size: 26px;
                font-weight: 300;
                color: var(--text);
                transition:
                    transform 0.12s var(--ease),
                    background 0.2s,
                    border-color 0.2s;
                position: relative;
                overflow: hidden;
                touch-action: manipulation;
            }
            .numpad button::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: radial-gradient(circle at center, rgba(196, 168, 92, 0.4), transparent 70%);
                opacity: 0;
                transition: opacity 0.4s;
                pointer-events: none;
            }
            .numpad button:active {
                transform: scale(0.9);
                background: var(--surface-2);
                border-color: var(--border-lift);
            }
            .numpad button:active::after {
                opacity: 1;
                transition: opacity 0.05s;
            }
            .numpad .del {
                color: var(--text-3);
                font-size: 20px;
            }
            .numpad .ok {
                background: linear-gradient(145deg, var(--accent-2), var(--accent));
                color: #0a0e0c;
                font-weight: 500;
                font-size: 13px;
                letter-spacing: 0.15em;
                border-color: transparent;
                box-shadow: 0 4px 20px rgba(196, 168, 92, 0.2);
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeSlide {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                }
            }

            /* ============ APP ============ */
            #app {
                display: none;
                opacity: 0;
                transition: opacity 0.4s var(--ease);
            }
            #app.show {
                display: block;
                opacity: 1;
            }

            /* Header */
            .header {
                padding: 20px 22px 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: sticky;
                top: 0;
                z-index: 20;
                background: linear-gradient(to bottom, var(--bg) 65%, transparent);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .header h1 {
                font-family: var(--font-display);
                font-style: italic;
                font-weight: 300;
                font-size: 26px;
                letter-spacing: -0.02em;
                animation: fadeSlide 0.5s var(--ease);
            }
            .header-actions {
                display: flex;
                gap: 8px;
            }
            .icon-btn {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: var(--surface);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-2);
                font-size: 16px;
                transition: all 0.2s var(--ease);
                touch-action: manipulation;
            }
            .icon-btn:active {
                transform: scale(0.9);
                background: var(--surface-2);
                color: var(--text);
            }

            .sync-indicator {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 10px;
                border-radius: 20px;
                background: var(--surface);
                border: 1px solid var(--border);
                font-size: 11px;
                color: var(--text-3);
                letter-spacing: 0.05em;
            }
            .sync-indicator .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--success);
            }
            .sync-indicator.syncing .dot {
                background: var(--accent);
                animation: pulse 1s infinite;
            }
            .sync-indicator.error .dot {
                background: var(--danger);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* Tabs */
            .tabs {
                display: flex;
                padding: 0 18px;
                gap: 4px;
                margin-bottom: 22px;
                overflow-x: auto;
                scrollbar-width: none;
            }
            .tabs::-webkit-scrollbar {
                display: none;
            }
            .tab {
                padding: 10px 16px;
                border-radius: 20px;
                background: transparent;
                color: var(--text-3);
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
                transition: all 0.25s var(--ease);
                position: relative;
                touch-action: manipulation;
            }
            .tab.active {
                color: var(--text);
                background: var(--surface);
            }
            .tab.active::before {
                content: "";
                position: absolute;
                left: 16px;
                right: 16px;
                bottom: 6px;
                height: 1px;
                background: var(--accent);
                animation: expand 0.3s var(--ease);
            }
            @keyframes expand {
                from {
                    transform: scaleX(0);
                }
                to {
                    transform: scaleX(1);
                }
            }

            /* Pages */
            .page {
                display: none;
                padding: 0 18px;
                animation: pageIn 0.4s var(--ease);
            }
            .page.active {
                display: block;
            }
            @keyframes pageIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* ============ DASHBOARD ============ */
            .hero-card {
                background: linear-gradient(160deg, var(--surface) 0%, var(--bg-2) 100%);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 26px 24px;
                margin-bottom: 14px;
                position: relative;
                overflow: hidden;
            }
            .hero-card::before {
                content: "";
                position: absolute;
                top: 0;
                right: 0;
                width: 200px;
                height: 200px;
                background: radial-gradient(circle, rgba(196, 168, 92, 0.08), transparent 70%);
                pointer-events: none;
            }
            .hero-label {
                font-size: 11px;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: var(--text-4);
                margin-bottom: 10px;
            }
            .hero-value {
                font-family: var(--font-display);
                font-weight: 300;
                font-size: 44px;
                letter-spacing: -0.03em;
                line-height: 1;
                margin-bottom: 8px;
                font-variant-numeric: tabular-nums;
            }
            .hero-value .unit {
                font-size: 20px;
                color: var(--text-3);
                margin-left: 6px;
                letter-spacing: 0;
            }
            .hero-sub {
                font-size: 13px;
                color: var(--text-3);
            }
            .hero-sub .sep {
                color: var(--text-4);
                margin: 0 8px;
            }

            .stat-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 22px;
            }
            .stat-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 18px 16px;
                transition: all 0.25s var(--ease);
            }
            .stat-card:active {
                transform: scale(0.98);
            }
            .stat-card .label {
                font-size: 10px;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: var(--text-4);
                margin-bottom: 8px;
            }
            .stat-card .value {
                font-family: var(--font-display);
                font-weight: 300;
                font-size: 24px;
                letter-spacing: -0.02em;
                font-variant-numeric: tabular-nums;
            }
            .stat-card .value .unit {
                font-size: 12px;
                color: var(--text-3);
                margin-left: 3px;
            }
            .stat-card.epargne .value {
                color: var(--accent);
            }
            .stat-card.carte .value {
                color: var(--violet);
            }
            .stat-card .foot {
                font-size: 11px;
                color: var(--text-3);
                margin-top: 4px;
            }

            /* Repartition */
            .section-title {
                font-family: var(--font-display);
                font-style: italic;
                font-weight: 400;
                font-size: 17px;
                padding: 8px 4px 14px;
                color: var(--text);
                letter-spacing: -0.01em;
            }
            .repart {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 18px 18px 12px;
                margin-bottom: 14px;
            }
            .repart-bar {
                display: flex;
                height: 6px;
                border-radius: 3px;
                overflow: hidden;
                margin-bottom: 18px;
                background: var(--bg-2);
            }
            .repart-bar .seg {
                height: 100%;
                transform-origin: left;
                animation: growX 0.7s var(--ease);
            }
            @keyframes growX {
                from {
                    transform: scaleX(0);
                }
                to {
                    transform: scaleX(1);
                }
            }
            .repart-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .repart-row {
                display: grid;
                grid-template-columns: 24px 1fr auto auto;
                gap: 12px;
                align-items: center;
                font-size: 14px;
            }
            .repart-row .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
            }
            .repart-row .name {
                color: var(--text);
            }
            .repart-row .amt {
                color: var(--text-2);
                font-variant-numeric: tabular-nums;
                font-weight: 500;
            }
            .repart-row .pct {
                font-size: 11px;
                color: var(--text-4);
                margin-left: 6px;
            }

            /* Goal */
            .goal-card {
                background: linear-gradient(160deg, var(--surface) 0%, var(--bg-2) 100%);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 24px;
                position: relative;
                overflow: hidden;
                margin-bottom: 20px;
            }
            .goal-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 20px;
            }
            .goal-title {
                font-family: var(--font-display);
                font-style: italic;
                font-weight: 400;
                font-size: 18px;
            }
            .goal-target {
                font-size: 12px;
                color: var(--text-3);
                letter-spacing: 0.05em;
            }
            .goal-progress-wrap {
                height: 10px;
                background: var(--bg-2);
                border-radius: 5px;
                overflow: hidden;
                margin-bottom: 14px;
                box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            }
            .goal-progress {
                height: 100%;
                background: linear-gradient(90deg, var(--accent-dim), var(--accent), var(--accent-2));
                border-radius: 5px;
                transform-origin: left;
                animation: goalGrow 1.2s var(--ease) 0.3s backwards;
                box-shadow: 0 0 12px rgba(196, 168, 92, 0.3);
            }
            @keyframes goalGrow {
                from {
                    transform: scaleX(0);
                }
                to {
                    transform: scaleX(var(--goal-scale, 1));
                }
            }
            .goal-numbers {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .goal-current {
                font-family: var(--font-display);
                font-weight: 300;
                font-size: 32px;
                letter-spacing: -0.02em;
                color: var(--accent);
                font-variant-numeric: tabular-nums;
            }
            .goal-remain {
                font-size: 12px;
                color: var(--text-3);
            }

            /* Insights */
            .insight {
                padding: 14px 16px;
                margin-bottom: 8px;
                border-radius: 12px;
                background: var(--surface);
                border: 1px solid var(--border);
                font-size: 13px;
                color: var(--text-2);
                display: flex;
                gap: 12px;
                align-items: flex-start;
                animation: fadeSlide 0.5s var(--ease) backwards;
                line-height: 1.5;
            }
            .insight .icon {
                flex-shrink: 0;
                margin-top: 1px;
            }
            .insight.good {
                border-left: 2px solid var(--success);
                padding-left: 14px;
            }
            .insight.warn {
                border-left: 2px solid var(--accent);
                padding-left: 14px;
            }
            .insight.bad {
                border-left: 2px solid var(--danger);
                padding-left: 14px;
            }

            /* ============ LISTS ============ */
            .filter-scroll {
                display: flex;
                gap: 8px;
                padding-bottom: 4px;
                overflow-x: auto;
                scrollbar-width: none;
                margin-bottom: 14px;
            }
            .filter-scroll::-webkit-scrollbar {
                display: none;
            }
            .filter-chip {
                padding: 8px 14px;
                border-radius: 18px;
                background: var(--surface);
                color: var(--text-3);
                font-size: 12px;
                font-weight: 500;
                white-space: nowrap;
                border: 1px solid var(--border);
                transition: all 0.2s var(--ease);
                touch-action: manipulation;
            }
            .filter-chip.active {
                background: var(--text);
                color: var(--bg);
                border-color: var(--text);
            }

            .day-group {
                margin-bottom: 4px;
            }
            .day-label {
                font-size: 10px;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                color: var(--text-4);
                padding: 18px 4px 8px;
            }
            .day-total {
                float: right;
                font-family: var(--font-display);
                font-style: italic;
                font-weight: 400;
                font-size: 13px;
                color: var(--text-3);
                letter-spacing: normal;
                text-transform: none;
            }
            .list-item {
                display: grid;
                grid-template-columns: 36px 1fr auto;
                gap: 12px;
                align-items: center;
                padding: 14px 16px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 14px;
                margin-bottom: 6px;
                transition: all 0.2s var(--ease);
                animation: fadeSlide 0.35s var(--ease) backwards;
                cursor: pointer;
                position: relative;
                overflow: hidden;
                touch-action: manipulation;
            }
            .list-item:active {
                transform: scale(0.99);
                background: var(--surface-2);
                border-color: var(--border-lift);
            }
            .list-item .cat-icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 15px;
                background: rgba(255, 255, 255, 0.03);
            }
            .list-item .body {
                min-width: 0;
            }
            .list-item .desc {
                font-size: 14px;
                color: var(--text);
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 2px;
            }
            .list-item .meta {
                font-size: 11px;
                color: var(--text-3);
                letter-spacing: 0.02em;
            }
            .list-item .amt {
                font-family: var(--font-display);
                font-weight: 400;
                font-size: 16px;
                letter-spacing: -0.01em;
                font-variant-numeric: tabular-nums;
            }
            .list-item .amt .unit {
                font-size: 11px;
                color: var(--text-3);
                margin-left: 3px;
            }
            .list-item.pos .amt {
                color: var(--success);
            }
            .list-item.neg .amt {
                color: var(--text);
            }

            .empty {
                text-align: center;
                padding: 60px 20px;
                color: var(--text-3);
                font-size: 13px;
            }
            .empty .glyph {
                font-family: var(--font-display);
                font-style: italic;
                font-weight: 300;
                font-size: 48px;
                color: var(--text-4);
                margin-bottom: 8px;
                display: block;
            }

            /* ============ CARTE PAGE ============ */
            .carte-hero {
                background: linear-gradient(160deg, #1d1425 0%, #10131c 100%);
                border: 1px solid #2a2035;
                border-radius: 20px;
                padding: 26px 24px;
                margin-bottom: 18px;
                position: relative;
                overflow: hidden;
            }
            .carte-hero::before {
                content: "";
                position: absolute;
                top: -80px;
                right: -80px;
                width: 200px;
                height: 200px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(155, 135, 190, 0.15), transparent 70%);
                pointer-events: none;
            }
            .carte-hero .hero-value {
                color: var(--violet);
            }
            .plafond-bar-wrap {
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid #2a2035;
            }
            .plafond-label {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: var(--text-3);
                margin-bottom: 8px;
                letter-spacing: 0.05em;
            }
            .plafond-bar {
                height: 8px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 4px;
                overflow: hidden;
            }
            .plafond-fill {
                height: 100%;
                background: linear-gradient(90deg, var(--violet), #d9954a);
                border-radius: 4px;
                transform-origin: left;
                transform: scaleX(0);
                transition: transform 1s var(--ease) 0.3s;
            }

            /* ============ FAB ============ */
            .fab-wrap {
                position: fixed;
                bottom: calc(24px + env(safe-area-inset-bottom, 0));
                right: 24px;
                z-index: 30;
                max-width: 640px;
                margin: 0 auto;
            }
            .fab {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: linear-gradient(145deg, var(--accent-2), var(--accent));
                color: #0a0e0c;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow:
                    0 12px 32px rgba(196, 168, 92, 0.28),

            async function fetchAll() {

                if (depR.error) {
                    console.error("Depenses:", depR.error);
                    throw depR.error;
                }
                if (revR.error) {
                    console.error("Revenus:", revR.error);
                    throw revR.error;
                }
                if (ctR.error) {
                    console.error("Carte:", ctR.error);
                    throw ctR.error;
                }
                if (txR.error) {
                    console.error("Taux:", txR.error);
                    throw txR.error;
                }

                state.depenses = (depR.data || []).map((d) => ({ ...d, amount: parseFloat(d.amount) }));
                state.revenus = (revR.data || []).map((r) => ({ ...r, amount: parseFloat(r.amount) }));
                state.carte = (ctR.data || []).map((c) => ({
                    ...c,
                    usd: parseFloat(c.usd || 0),

                    rate: parseFloat(c.rate || 0),
                    total_dt: parseFloat(c.total_dt || 0),
                    card: c.card || "techno",

                if (txR.data && txR.data[0]) {

                        usd_vente: parseFloat(txR.data[0].usd_vente),
                        eur_vente: parseFloat(txR.data[0].eur_vente),
                    };
                }

                return { dep: state.depenses.length, rev: state.revenus.length, carte: state.carte.length };
            }

            // ============ HELPERS ============
            function catInfo(name) {
                return CATEGORIES.find((c) => c.name === name) || { name, glyph: "·", color: "#6B6E68" };
            }

            function isThisMonth(iso) {
                if (!iso) return false;
                const d = new Date(iso);
                const now = new Date();
                return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
            }

            function dayLabel(iso) {
                if (!iso) return "Sans date";
                const d = new Date(iso);
                if (isNaN(d)) return iso;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const target = new Date(d);
                target.setHours(0, 0, 0, 0);
                const diff = Math.round((today - target) / 86400000);
                if (diff === 0) return "Aujourd'hui";
                if (diff === 1) return "Hier";
                if (diff < 7) return d.toLocaleDateString("fr-FR", { weekday: "long" });
                return d.toLocaleDateString("fr-FR", { day: "numeric", month: "long" });
            }

            function groupByDay(items) {
                const g = {};
                items.forEach((it) => {
                    const d = it.date || "";
                    if (!g[d]) g[d] = [];
                    g[d].push(it);
                });
                return Object.keys(g)
                    .sort((a, b) => b.localeCompare(a))
                    .map((d) => ({ date: d, items: g[d] }));
            }

            // ============ ANIMATED COUNTER ============
            function animateNumber(el, from, to, duration = 700) {
                const start = performance.now();

                function step(now) {
                    const t = Math.min(1, (now - start) / duration);
                    const eased = 1 - Math.pow(1 - t, 3);
                    const val = from + (to - from) * eased;
                    el.textContent = fmt(val);
                    if (t < 1) requestAnimationFrame(step);
                    else el.textContent = fmt(to);
                }
                requestAnimationFrame(step);
            }

                }
                if (!insights.length) {
                    insights.push({ type: "good", text: `Rien de particulier à signaler pour l'instant. Continue de tracker.` });
                }
                insights.forEach((i, idx) => {
                    const div = document.createElement("div");
                    div.className = "insight " + i.type;
                    div.style.animationDelay = idx * 0.08 + 0.2 + "s";
                    div.innerHTML = `<span class="icon">${i.type === "good" ? "✓" : i.type === "bad" ? "!" : "·"}</span><span>${i.text}</span>`;
                    ins.appendChild(div);
                });
            }

            // ============ LISTS ============
            function renderDepenses() {
                const p = document.getElementById("page-depenses");
                const chips = ["Tous", ...CATEGORIES.map((c) => c.name)];
                const filtered = currentFilter === "Tous" ? state.depenses : state.depenses.filter((d) => d.category === currentFilter);

                p.innerHTML = `
            <div class="filter-scroll dep-filters"></div>
            <div class="dep-list"></div>
          `;

                const fEl = p.querySelector(".dep-filters");
                chips.forEach((c) => {
                    const btn = document.createElement("button");
                    btn.className = "filter-chip" + (currentFilter === c ? " active" : "");
                    btn.textContent = c;
                    btn.onclick = () => {
                        vibrate(6);
                        currentFilter = c;
                        renderDepenses();
                    };
                    fEl.appendChild(btn);
                });

                renderListInto(p.querySelector(".dep-list"), filtered, "depense");
            }

            function renderRevenus() {
                const p = document.getElementById("page-revenus");
                p.innerHTML = '<div class="rev-list"></div>';
                renderListInto(p.querySelector(".rev-list"), state.revenus, "revenu");
            }

            function renderCarte() {
                const p = document.getElementById("page-carte");
                const activeCard = state.activeCard || "techno";
                const ops = state.carte.filter((c) => (c.card || "techno") === activeCard);

                const plus = ops.filter((c) => c.type === "Rechargement" || c.type === "Remboursement").reduce((s, c) => s + c.total_dt, 0);
                const minus = ops.filter((c) => c.type === "Achat").reduce((s, c) => s + c.total_dt, 0);
                const solde = plus - minus;

                const isTechno = activeCard === "techno";
                const plafondPct = isTechno ? Math.min(1, minus / 1000) : 0;
                const cardName = isTechno ? "Zitouna Technologique" : "La Poste D17";
                const gradient = isTechno ? "linear-gradient(160deg, #1D1425 0%, #10131C 100%)" : "linear-gradient(160deg, #1A2419 0%, #0F1913 100%)";
                const border = isTechno ? "#2A2035" : "#1F3025";
                const valueColor = isTechno ? "var(--violet)" : "var(--success)";

                p.innerHTML = `
            <div class="card-selector">
              <button class="card-btn ${isTechno ? "active" : ""}" data-card="techno" aria-label="Carte Zitouna Technologique">
                <img src="images/techno.png" alt="Zitouna Technologique" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="card-fallback" style="display:none">Zitouna<br>Technologique</div>
                <div class="card-badge">Techno</div>
              </button>
              <button class="card-btn ${!isTechno ? "active" : ""}" data-card="d17" aria-label="Carte D17">
                <img src="images/d17.png" alt="D17" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="card-fallback" style="display:none">La Poste<br>D17</div>
                <div class="card-badge">D17</div>
              </button>
            </div>

            <div class="carte-hero" style="background:${gradient};border-color:${border}">
              <div class="hero-label">${cardName}</div>
              <div class="hero-value" style="color:${valueColor}"><span class="carte-solde-val">0,00</span><span class="unit">DT</span></div>
              <div class="hero-sub">${ops.length} opération${ops.length > 1 ? "s" : ""}</div>
              ${
                  isTechno
                      ? `
                <div class="plafond-bar-wrap">
                  <div class="plafond-label">
                    <span>Plafond annuel devises</span>
                    <span><span class="plafond-used">0</span> / 1 000 DT</span>
                  </div>
                  <div class="plafond-bar"><div class="plafond-fill"></div></div>
                </div>
              `
                      : ""
              }
            </div>
            <div class="carte-list"></div>
          `;

                p.querySelectorAll(".card-btn").forEach((btn) => {
                    btn.onclick = () => {
                        vibrate(8);
                        state.activeCard = btn.dataset.card;
                        renderCarte();
                    };
                });

                animateNumber(p.querySelector(".carte-solde-val"), 0, solde);
                if (isTechno) {
                    animateNumber(p.querySelector(".plafond-used"), 0, minus);
                    const fill = p.querySelector(".plafond-fill");
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            fill.style.transform = "scaleX(" + plafondPct + ")";
                        });
                    });
                }

                renderListInto(p.querySelector(".carte-list"), ops, "carte");
            }

            function renderListInto(container, items, kind) {
                if (items.length === 0) {
                    container.innerHTML = `<div class="empty"><span class="glyph">◦</span>Rien à afficher pour l'instant.</div>`;
                    return;
                }
                const groups = groupByDay(items);
                container.innerHTML = "";
                let animDelay = 0;

                groups.forEach((g) => {
                    const dayDiv = document.createElement("div");
                    dayDiv.className = "day-group";

                    let totalDay = 0;
                    if (kind === "depense") totalDay = g.items.filter((i) => i.category !== "Epargne").reduce((s, i) => s + i.amount, 0);
                    else if (kind === "revenu") totalDay = g.items.reduce((s, i) => s + i.amount, 0);
                    else totalDay = g.items.filter((i) => i.type === "Achat").reduce((s, i) => s + i.total_dt, 0);

                    const label = document.createElement("div");
                    label.className = "day-label";
                    label.innerHTML = `${dayLabel(g.date)} <span class="day-total">${fmt(totalDay)} DT</span>`;
                    dayDiv.appendChild(label);

                    g.items.forEach((it) => {
                        const row = document.createElement("div");
                        row.className = "list-item";
                        row.style.animationDelay = animDelay + "s";
                        animDelay += 0.03;

                        let iconGlyph, iconColor, iconBg, desc, meta, amt, cls;
                        if (kind === "depense") {
                            const info = catInfo(it.category);
                            iconGlyph = info.glyph;
                            iconColor = info.color;
                            iconBg = info.color + "20";
                            desc = it.description || "—";
                            meta = it.category;
                            amt = fmt(it.amount);
                            cls = it.category === "Epargne" ? "pos" : "neg";
                        } else if (kind === "revenu") {
                            iconGlyph = "+";
                            iconColor = "#6DB89B";
                            iconBg = "rgba(109, 184, 155, 0.15)";
                            desc = it.source || "—";
                            meta = "Rentrée";
                            amt = fmt(it.amount);
                            cls = "pos";
                        } else {
                            const isAchat = it.type === "Achat";
                            iconGlyph = isAchat ? "−" : "+";
                            iconColor = isAchat ? "#9B87BE" : "#6DB89B";
                            iconBg = iconColor + "20";
                            desc = it.description || "—";
                            let extra = "";
                            if (it.currency === "USD" && it.usd) extra = ` · ${it.usd} $`;
                            else if (it.currency === "EUR" && it.eur) extra = ` · ${fmt(it.eur)} €`;
                            meta = `${it.type}${extra}`;
                            amt = fmt(it.total_dt);
                            cls = isAchat ? "neg" : "pos";
                        }

                        row.classList.add(cls);
                        row.innerHTML = `
                            <div class="cat-icon" style="background:${iconBg};color:${iconColor}">${iconGlyph}</div>
                            <div class="body">
                              <div class="desc">${escapeHtml(desc)}</div>
                              <div class="meta">${escapeHtml(meta)}</div>
                            </div>
                            <div class="amt">${amt}<span class="unit">DT</span></div>
                          `;
                        row.onclick = () => {
                            vibrate(8);
                            openEditModal(kind, it.id);
                        };
                        dayDiv.appendChild(row);
                    });
                    container.appendChild(dayDiv);
                });
            }

            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
            }

            // ============ MODAL ============
            function openAddModal() {
                vibrate(12);
                editing = null;
                document.getElementById("modal-title").textContent = "Nouvelle entrée";
                document.getElementById("entry-date").valueAsDate = new Date();
                document.getElementById("entry-desc").value = "";
                document.getElementById("entry-source").value = "";
                document.getElementById("entry-amount").value = "";
                document.getElementById("carte-op-type").value = "Achat";
                document.getElementById("carte-devise").value = "DT";
                document.getElementById("carte-which").value = state.activeCard || "techno";
                document.getElementById("delete-row").style.display = "none";

                const typeSel = document.getElementById("entry-type");
                if (currentPage === "revenus") typeSel.value = "revenu";
                else if (currentPage === "carte") typeSel.value = "carte";
                else typeSel.value = "depense";

                renderCatGrid("Bouffe");
                onEntryTypeChange();
                document.getElementById("modal-backdrop").classList.add("open");
            }

            function openEditModal(kind, id) {
                vibrate(8);
                editing = { kind, id };
                document.getElementById("modal-title").textContent = "Modifier";
                document.getElementById("delete-row").style.display = "flex";

                const typeSel = document.getElementById("entry-type");
                typeSel.value = kind;

                let entry;
                if (kind === "depense") {
                    entry = state.depenses.find((d) => d.id === id);
                    document.getElementById("entry-date").value = entry.date || "";
                    document.getElementById("entry-desc").value = entry.description || "";
                    document.getElementById("entry-amount").value = entry.amount;
                    renderCatGrid(entry.category);
                } else if (kind === "revenu") {
                    entry = state.revenus.find((r) => r.id === id);
                    document.getElementById("entry-date").value = entry.date || "";
                    document.getElementById("entry-source").value = entry.source || "";
                    document.getElementById("entry-amount").value = entry.amount;
                } else {
                    entry = state.carte.find((c) => c.id === id);
                    document.getElementById("entry-date").value = entry.date || "";
                    document.getElementById("entry-desc").value = entry.description || "";
                    document.getElementById("carte-which").value = entry.card || "techno";
                    document.getElementById("carte-op-type").value = entry.type;
                    document.getElementById("carte-devise").value = entry.currency;
                    let a;
                    if (entry.currency === "USD") a = entry.usd;
                    else if (entry.currency === "EUR") a = entry.eur;
                    else a = entry.total_dt;
                    document.getElementById("entry-amount").value = a;
                }
                onEntryTypeChange();
                document.getElementById("modal-backdrop").classList.add("open");
            }

            function closeModal() {
                vibrate(6);
                document.getElementById("modal-backdrop").classList.remove("open");
            }

            function onEntryTypeChange() {
                const t = document.getElementById("entry-type").value;
                document.getElementById("field-desc").style.display = t === "revenu" ? "none" : "block";
                document.getElementById("field-source").style.display = t === "revenu" ? "block" : "none";
                document.getElementById("field-category").style.display = t === "depense" ? "block" : "none";
                document.getElementById("field-carte-which").style.display = t === "carte" ? "block" : "none";
                document.getElementById("field-carte-type").style.display = t === "carte" ? "block" : "none";
                document.getElementById("field-carte-preview").style.display = t === "carte" ? "block" : "none";
                onCarteWhichChange();
            }

            function onCarteWhichChange() {
                const t = document.getElementById("entry-type").value;
                if (t !== "carte") return;
                const which = document.getElementById("carte-which").value;
                const devSel = document.getElementById("carte-devise");
                const devField = document.getElementById("field-carte-devise");
                if (which === "d17") {
                    devSel.value = "DT";
                    devField.style.display = "none";
                } else {
                    devField.style.display = "block";
                }
                calcCarteTotal();
            }

            function calcCarteTotal() {
                if (document.getElementById("entry-type").value !== "carte") return;
                const dev = document.getElementById("carte-devise").value;
                const amt = parseFloat(document.getElementById("entry-amount").value) || 0;
                let tot = amt;
                if (dev === "USD") tot = amt * state.taux.usd_vente;
                else if (dev === "EUR") tot = amt * state.taux.eur_vente;
                document.getElementById("carte-preview").textContent = fmt(tot) + " DT";
                document.getElementById("amount-label").textContent = "Montant (" + dev + ")";
            }

            function renderCatGrid(sel) {
                const g = document.getElementById("cat-grid");
                g.innerHTML = "";
                CATEGORIES.forEach((c) => {
                    const b = document.createElement("button");
                    b.type = "button";
                    b.className = "cat-btn" + (c.name === sel ? " active" : "");
                    b.dataset.cat = c.name;
                    b.innerHTML = `<span class="glyph" style="color:${c.color}">${c.glyph}</span>${c.name}`;
                    b.onclick = () => {
                        vibrate(6);
                        g.querySelectorAll(".cat-btn").forEach((x) => x.classList.remove("active"));
                        b.classList.add("active");
                    };
                    g.appendChild(b);
                });
            }

            async function saveEntry() {
                vibrate(10);
                const t = document.getElementById("entry-type").value;
                const date = document.getElementById("entry-date").value;
                const amt = parseFloat(document.getElementById("entry-amount").value);
                if (isNaN(amt) || amt <= 0) {
                    toast("Montant requis", true);
                    return;
                }

                let kind, entry;
                if (t === "depense") {
                    kind = "depense";
                    const cat = document.querySelector("#cat-grid .cat-btn.active")?.dataset.cat || "Autre";
                    entry = {
                        id: editing?.id || "d" + Date.now(),
                        date: date || null,
                        description: document.getElementById("entry-desc").value.trim(),
                        category: cat,
                        amount: amt,
                    };
                    if (editing) {
                        const idx = state.depenses.findIndex((d) => d.id === editing.id);
                        if (idx >= 0) state.depenses[idx] = entry;
                    } else state.depenses.push(entry);
                } else if (t === "revenu") {
                    kind = "revenu";
                    entry = {
                        id: editing?.id || "r" + Date.now(),
                        date: date || null,
                        source: document.getElementById("entry-source").value.trim() || "—",
                        amount: amt,
                    };
                    if (editing) {
                        const idx = state.revenus.findIndex((r) => r.id === editing.id);
                        if (idx >= 0) state.revenus[idx] = entry;
                    } else state.revenus.push(entry);
                } else {
                    kind = "carte";
                    const which = document.getElementById("carte-which").value;
                    const dev = which === "d17" ? "DT" : document.getElementById("carte-devise").value;
                    const rate = dev === "USD" ? state.taux.usd_vente : dev === "EUR" ? state.taux.eur_vente : 1;
                    entry = {
                        id: editing?.id || "c" + Date.now(),
                        date: date || null,
                        description: document.getElementById("entry-desc").value.trim(),
                        type: document.getElementById("carte-op-type").value,
                        currency: dev,
                        usd: dev === "USD" ? amt : 0,
                        eur: dev === "EUR" ? amt : 0,
                        rate: rate,
                        total_dt: amt * rate,
                        card: which,
                    };
                    if (editing) {
                        const idx = state.carte.findIndex((c) => c.id === editing.id);
                        if (idx >= 0) state.carte[idx] = entry;
                    } else state.carte.push(entry);
                }

                closeModal();
                render();
                toast(editing ? "Modifié" : "Enregistré");
                await pushEntry(kind, entry);
            }

            async function deleteEntry() {
                vibrate(20);
                if (!editing) return;
                if (!confirm("Supprimer définitivement ?")) return;
                const { kind, id } = editing;
                if (kind === "depense") state.depenses = state.depenses.filter((d) => d.id !== id);
                else if (kind === "revenu") state.revenus = state.revenus.filter((r) => r.id !== id);
                else state.carte = state.carte.filter((c) => c.id !== id);
                closeModal();
                render();
                toast("Supprimé");
                await deleteEntryRemote(kind, id);
            }

            // ============ SETTINGS ============
            function renderSettings() {
                const p = document.getElementById("page-settings");
                p.innerHTML = `
            <div class="section-eyebrow">Taux de change · Zitouna</div>
            <div class="setting-row">
              <div class="info">
                <div class="info-label">Dollars (USD)</div>
                <div class="info-sub">Taux vente actuel</div>
              </div>
              <input type="number" step="0.0001" id="s-usd" value="${state.taux.usd_vente}">
            </div>
            <div class="setting-row">
              <div class="info">
                <div class="info-label">Euros (EUR)</div>
                <div class="info-sub">Taux vente actuel</div>
              </div>
              <input type="number" step="0.0001" id="s-eur" value="${state.taux.eur_vente}">
            </div>
            <div class="setting-row">
              <div class="info">
                <div class="info-label">Source officielle</div>
                <div class="info-sub">Mets à jour une fois par semaine</div>
              </div>
              <a href="https://www.dinartunisien.com/fr/banque/zitouna" target="_blank" style="color:var(--accent);text-decoration:none;font-size:13px">Ouvrir ↗</a>
            </div>

            <div class="section-eyebrow">Sécurité</div>
            <div class="setting-row" style="opacity:0.6;cursor:default;pointer-events:none">
              <div class="info">
                <div class="info-label">Code PIN</div>
                <div class="info-sub">Fixé · 14112411</div>
              </div>
              <span style="color:var(--text-4);font-size:12px;letter-spacing:0.05em">🔒</span>
            </div>

            <div class="section-eyebrow">Sauvegardes</div>
            <button class="setting-row" onclick="exportData()">
              <div class="info">
                <div class="info-label">Exporter en JSON</div>
                <div class="info-sub">Télécharger un fichier de sauvegarde</div>
              </div>
              <span class="arrow" style="color:var(--accent)">↓</span>
            </button>
            <button class="setting-row" onclick="forceSync()">
              <div class="info">
                <div class="info-label">Forcer la synchronisation</div>
                <div class="info-sub">Recharger depuis Supabase</div>
              </div>
              <span class="arrow" style="color:var(--accent)">↻</span>
            </button>

            <div class="section-eyebrow">Réinjection depuis Excel</div>
            <button class="setting-row" onclick="reMigrate()" style="border-color:rgba(196, 168, 92, 0.3)">
              <div class="info">
                <div class="info-label" style="color:var(--accent)">Re-migrer depuis le fichier Excel</div>
                <div class="info-sub">Écrase tout et réinjecte les 60 dép. / 15 rev. / 12 carte</div>
              </div>
              <span class="arrow" style="color:var(--accent)">↻</span>
            </button>

            <div class="section-eyebrow">Zone rouge</div>
            <button class="setting-row" onclick="resetAll()" style="border-color:rgba(217, 117, 88, 0.3)">
              <div class="info">
                <div class="info-label" style="color:var(--danger)">Tout effacer sur Supabase</div>
                <div class="info-sub">Action irréversible</div>
              </div>
              <span class="arrow" style="color:var(--danger)">×</span>
            </button>

            <div style="text-align:center;padding:40px 0 20px;font-size:11px;color:var(--text-4);letter-spacing:0.15em;">
              Carnet · v1.0
            </div>
          `;

                // Attach change handlers with vibration
                const usdIn = document.getElementById("s-usd");
                const eurIn = document.getElementById("s-eur");
                usdIn.onchange = (e) => {
                    vibrate(6);
                    state.taux.usd_vente = parseFloat(e.target.value);
                    pushTaux();
                    toast("Taux USD mis à jour");
                };
                eurIn.onchange = (e) => {
                    vibrate(6);
                    state.taux.eur_vente = parseFloat(e.target.value);
                    pushTaux();
                    toast("Taux EUR mis à jour");
                };
            }

            function exportData() {
                vibrate(10);
                const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "carnet-" + new Date().toISOString().slice(0, 10) + ".json";
                a.click();
                URL.revokeObjectURL(url);
                toast("Exporté");
            }

            async function forceSync() {
                vibrate(12);
                document.getElementById("loading").style.display = "flex";
                await bootstrap();
                document.getElementById("loading").style.display = "none";
                render();
                toast("Synchronisé");
            }

            async function resetAll() {
                vibrate(20);
                if (!confirm("Vraiment tout effacer sur Supabase ? Cette action est irréversible.")) return;
                if (!confirm("Confirmation finale : je supprime tout ?")) return;
                setSync("syncing", "Effacement…");
                try {
                    await sb.from("depenses").delete().neq("id", "");
                    await sb.from("revenus").delete().neq("id", "");
                    await sb.from("carte").delete().neq("id", "");
                    state.depenses = [];
                    state.revenus = [];
                    state.carte = [];
                    localStorage.removeItem(MIGRATED_KEY);
                    render();
                    setSync("", "À jour");
                    toast("Tout effacé");
                } catch (e) {
                    setSync("error", "Erreur");
                    toast("Erreur", true);
                }
            }

            // ============ TOAST ============
            function toast(msg, isError = false) {
                const el = document.getElementById("toast");
                el.className = "toast" + (isError ? " error" : "");
                document.getElementById("toast-text").textContent = msg;
                document.querySelector(".toast-icon").textContent = isError ? "!" : "✓";
                el.classList.add("show");
                clearTimeout(el._t);
                el._t = setTimeout(() => el.classList.remove("show"), 2000);
            }

            // ============ INIT ============
            initLock();
            document.getElementById("modal-backdrop").addEventListener("click", (e) => {
                if (e.target.id === "modal-backdrop") closeModal();
            });

            // Add vibration to FAB via its own click handler (already has onclick)
            const fab = document.querySelector(".fab");
            if (fab) {
                const orig = fab.onclick;
                fab.onclick = function (e) {
                    vibrate(12);
                    if (orig) orig.call(this, e);
                };
            }

            // Also vibrate on setting rows clicks (any button-like setting rows)
            document.addEventListener("click", function (e) {
                const row = e.target.closest(".setting-row");
                if (row && row.onclick && typeof row.onclick === "function") {
                    // already handled by the specific onclick
                }
            });
        </script>
    </body>
</html>
